<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FORMS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="card">
    <form class="form" action="">
      <fieldset class="fs1">
        <legend class="legend">Ваши личные данные</legend>
        <label for="name" class="l1">Ваше имя</label>
        <input id="name " placeholder="Имя" required type="text">
        <label for="age" class="l2">Ваш возраст</label>
        <input id="age " placeholder="Возраст" required type="number">
        <label for="tel" class="l3">Ваш телефон</label>
        <input id="tel " placeholder="Телефон" required type="tel">
        <label for="mail" class="l4">Ваш Email</label>
        <input id="mail " placeholder="Почта" required type="email">
      </fieldset>
      <fieldset class="fs2">
        <label class="l5" for="massage"></label>
        <textarea class="ta" placeholder="Ваше сообщение" name="massage" id="massage"></textarea>
        <label class="l5" for="cb"> Поставить согласие 
          <input required id="cb" type="checkbox">
        </label>
        <button class="button" type="submit">Отправить</button>
      </fieldset>
    </form>
  </div>
</body>
</html>
